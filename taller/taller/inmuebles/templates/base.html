<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Inmobiliaria{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #2c3e50; padding: 1rem 2rem; }
        nav a { color: #fff; text-decoration: none; margin-right: 1.5rem; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .contenedor { padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 0.75rem 1rem; border: 1px solid #ddd; text-align: left; }
        th { background: #34495e; color: #fff; }
        tr:nth-child(even) { background: #f9f9f9; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'inmuebles:menu' %}">Inicio</a>
        <a href="{% url 'inmuebles:listar_edificios' %}">Edificios</a>
        <a href="{% url 'inmuebles:listar_departamentos' %}">Departamentos</a>
    </nav>

    <div class="contenedor">
        {% block contenido %}{% endblock %}
    </div>
</body>
</html>
