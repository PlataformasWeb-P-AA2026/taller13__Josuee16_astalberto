<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Departamentos</title>
</head>

<body>
  <h5>Listado de Departamentos - {{numero}}</h5>

  {% for e in datos %}

  <ol>
    <li><b>Nombre: </b>{{e['nombre_propietario']}}</li>
    <li><b>costo: </b>{{e['costo']}}</li>
    <li><b>numero de cuartos: </b>{{e['numero_cuartos']}}</li>
    <li><b>edificio: </b>{{e['edificio']}}</li>
  </ol>
  <hr>
  {% endfor%}
</body>

</html>
